name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-landing:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Point landing download links at this release
        run: python3 scripts/update_landing_downloads.py "$GITHUB_REF_NAME"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add landing/index.html
          if git diff --cached --quiet; then
            echo "landing page already up to date"
            exit 0
          fi
          git commit -m "Point landing downloads at $GITHUB_REF_NAME"
          git push origin main
      # Pushes made with GITHUB_TOKEN never trigger other push workflows,
      # so kick off the Pages deploy explicitly.
      - name: Deploy landing page
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
