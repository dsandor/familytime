<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#070b14">
<title>Family Time</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23070b14'/%3E%3Cpath d='M16 5L8 8v6c0 6 3.4 10 8 11.5C20.6 24 24 20 24 14V8l-8-3z' fill='%2322d3ee' fill-opacity='0.28' stroke='%2322d3ee' stroke-width='1.6'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/css/app.css">
<script defer src="/js/app.js"></script>
<script defer src="/js/alpine.min.js"></script>
</head>
<body x-data="app" x-cloak>

<div class="bg-ambient" aria-hidden="true"></div>

<!-- Top nav (authed views only) -->
<nav class="topnav" x-show="authedView()">
  <div class="brand">
    <span class="shield-mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none"><path d="M12 2.3L4.4 5.3V11C4.4 16.4 7.8 20.9 12 22.1C16.2 20.9 19.6 16.4 19.6 11V5.3L12 2.3Z" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="1.4" stroke-linejoin="round"/></svg>
    </span>
    <span class="wordmark">Family Time</span>
  </div>
  <div class="tabs" role="tablist">
    <button :class="{on: view==='home'}" @click="goHome()">Home</button>
    <button :class="{on: view==='groups' || view==='groupEditor'}" @click="goGroups()">Groups &amp; Devices</button>
    <button :class="{on: view==='rules' || view==='wizard'}" @click="goRules()">Rules</button>
    <button :class="{on: view==='settings'}" @click="goSettings()">Settings</button>
  </div>
</nav>

<div class="shell" :class="{'narrow-shell': !authedView()}">
  <!-- Global error banner -->
  <div class="banner" x-show="banner" x-text="banner" @click="banner=''"></div>

  <!-- Loading -->
  <template x-if="view==='loading'">
    <main class="center">
      <span class="shield-mark loading-shield" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="56" height="56" fill="none"><path d="M12 2.3L4.4 5.3V11C4.4 16.4 7.8 20.9 12 22.1C16.2 20.9 19.6 16.4 19.6 11V5.3L12 2.3Z" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="1.4" stroke-linejoin="round"/></svg>
      </span>
    </main>
  </template>

  <!-- First-run setup wizard -->
  <template x-if="view==='setup'">
    <main class="card narrow">
      <div class="hero">
        <span class="shield-mark pulse" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="52" height="52" fill="none"><path d="M12 2.3L4.4 5.3V11C4.4 16.4 7.8 20.9 12 22.1C16.2 20.9 19.6 16.4 19.6 11V5.3L12 2.3Z" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </span>
        <h1>Family Time</h1>
        <p class="sub">Screen-time rules your whole family can live with.</p>
      </div>

      <div class="steps" aria-hidden="true">
        <span class="step-dot" :class="{on: setup.step>=1}"></span>
        <span class="step-track"><span class="step-fill" :class="{on: setup.step>=2}"></span></span>
        <span class="step-dot" :class="{on: setup.step>=2}"></span>
      </div>

      <section x-show="setup.step===1">
        <h2>Connect to your UniFi gateway</h2>
        <label>Gateway address
          <input type="text" x-model="setup.host" placeholder="192.168.0.1">
        </label>
        <template x-if="state.envApiKey">
          <p class="hint">✓ An API key was found on the server — leave the field below empty to use it.</p>
        </template>
        <label>API key <span class="hint-inline">(UniFi console → Settings → Control Plane → Integrations)</span>
          <input type="password" x-model="setup.apiKey" :placeholder="state.envApiKey ? 'Using the server’s key' : 'Paste your API key'">
        </label>
        <button class="primary" :disabled="!setup.host || setup.testing" @click="testConnection()">
          <span x-show="!setup.testing">Test connection</span>
          <span x-show="setup.testing">Connecting…</span>
        </button>
        <p class="good" x-show="setup.testOK">✓ Connected to your gateway</p>
        <p class="bad" x-text="setup.testError"></p>
        <button class="primary" x-show="setup.testOK" @click="setup.step=2">Next: choose a PIN →</button>
      </section>

      <section x-show="setup.step===2">
        <h2>Choose a parent PIN</h2>
        <p class="sub">Kids on your WiFi shouldn't be able to undo family rules. 4–6 digits.</p>
        <label>PIN <input type="password" inputmode="numeric" maxlength="6" x-model="setup.pin"></label>
        <label>Repeat PIN <input type="password" inputmode="numeric" maxlength="6" x-model="setup.pin2"></label>
        <p class="bad" x-show="setup.pin2 && setup.pin!==setup.pin2">PINs don't match</p>
        <button class="primary" :disabled="!/^[0-9]{4,6}$/.test(setup.pin) || setup.pin!==setup.pin2"
                @click="finishSetup()">Finish setup</button>
      </section>
    </main>
  </template>

  <!-- PIN login -->
  <template x-if="view==='login'">
    <main class="card narrow center">
      <div class="hero">
        <span class="shield-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="52" height="52" fill="none"><path d="M12 2.3L4.4 5.3V11C4.4 16.4 7.8 20.9 12 22.1C16.2 20.9 19.6 16.4 19.6 11V5.3L12 2.3Z" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </span>
        <h1>Family Time</h1>
      </div>
      <div class="pin-dots">
        <template x-for="i in 6"><span class="dot" :class="{filled: pin.length>=i, ghost: i>6}"></span></template>
      </div>
      <div class="keypad">
        <template x-for="k in ['1','2','3','4','5','6','7','8','9','clr','0','ok']">
          <button :class="k==='ok' ? 'key primary' : 'key'"
                  @click="k==='clr' ? pin='' : (k==='ok' ? login() : (pin.length<6 && (pin+=k)))"
                  x-text="k==='clr' ? '⌫' : (k==='ok' ? '✓' : k)"></button>
        </template>
      </div>
      <p class="bad" x-text="loginError"></p>
    </main>
  </template>

  <!-- Home dashboard -->
  <template x-if="view==='home'">
    <main>
      <div class="hero-frame">
        <p class="eyebrow">Family Time</p>
        <h1 class="greeting" x-text="greeting()"></h1>
        <p class="sub" x-text="homeSubtitle()"></p>
      </div>

      <div class="stat-row">
        <div class="card stat-card">
          <span class="stat-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="17" cy="9" r="2.4" stroke="currentColor" stroke-width="1.4"/><path d="M15 19c0-2.2 1-4 3.2-4.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </span>
          <p class="eyebrow">Groups</p>
          <div class="stat-value"><span x-text="statGroups().count"></span><span class="stat-unit" x-text="statGroups().devices + (statGroups().devices===1?' device':' devices')"></span></div>
        </div>
        <div class="card stat-card">
          <span class="stat-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none"><path d="M12 2.3L4.4 5.3V11C4.4 16.4 7.8 20.9 12 22.1C16.2 20.9 19.6 16.4 19.6 11V5.3L12 2.3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </span>
          <p class="eyebrow">Rules</p>
          <div class="stat-value"><span x-text="statRules().count"></span><span class="stat-unit" x-text="statRules().active + ' active now'"></span></div>
        </div>
        <div class="card stat-card">
          <span class="stat-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="13" r="7.5" stroke="currentColor" stroke-width="1.6"/><path d="M12 9v4l3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.5 2.5h5M12 2.5V5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </span>
          <p class="eyebrow">Pauses</p>
          <div class="stat-value"><span x-text="statPauses().active"></span><span class="stat-unit">active now</span></div>
        </div>
      </div>

      <section class="section">
        <div class="section-head">
          <p class="eyebrow">Quick pause</p>
          <p class="sub">Give a group a break — right away, or in a little while.</p>
        </div>
        <template x-for="p in profiles" :key="p.id">
          <div class="card pause-card">
            <div class="pause-card-head">
              <span class="avatar" :style="'--accent:'+(p.color||'#22d3ee')" x-text="p.emoji || '🧒'"></span>
              <div class="grow">
                <h3 x-text="p.name"></h3>
                <p class="sub" x-text="(p.devices?p.devices.length:0) + ((p.devices&&p.devices.length===1)?' device':' devices')"></p>
              </div>
              <span class="badge badge-active" x-show="groupPause(p.id)">Active</span>
              <span class="badge badge-scheduled" x-show="groupPending(p.id)">Scheduled</span>
            </div>

            <template x-if="!groupPause(p.id) && !groupPending(p.id)">
              <div>
                <div class="pause-start">
                  <span class="label">Starting</span>
                  <template x-for="c in pauseDelayChoices" :key="c.id">
                    <button class="chip" :class="{ on: groupDelay(p.id) === c.id }"
                            @click="setGroupDelay(p.id, c.id)" x-text="c.label"></button>
                  </template>
                </div>
                <div class="pause-actions">
                  <button class="chip" @click="pause(p.id,'15m')">15m</button>
                  <button class="chip" @click="pause(p.id,'30m')">30m</button>
                  <button class="chip" @click="pause(p.id,'1h')">1h</button>
                  <button class="chip secondary" @click="pause(p.id,'morning')">Until morning</button>
                  <button class="chip secondary" @click="pause(p.id,'indefinite')"
                          :disabled="groupDelay(p.id) !== 'now'"
                          :title="groupDelay(p.id) !== 'now' ? 'Scheduled pauses need an end time — pick a timed duration.' : ''">Until I resume</button>
                </div>
              </div>
            </template>
            <template x-if="groupPause(p.id)">
              <div class="pausebox">
                <p class="sub">Paused<span x-show="groupPause(p.id).until" x-text="' until ' + fmtTime(groupPause(p.id).until)"></span></p>
                <div class="pausebox-actions">
                  <button class="more" @click="grantMore(p.id)">30 more min</button>
                  <button class="primary" @click="unpause(p.id)">Resume</button>
                </div>
              </div>
            </template>
            <template x-if="groupPending(p.id)">
              <div class="pausebox scheduled">
                <p class="sub" x-text="'Pauses at ' + fmtTime(groupPending(p.id).startsAt)
                  + (groupPending(p.id).until ? ' · until ' + fmtTime(groupPending(p.id).until) : '')"></p>
                <div class="pausebox-actions">
                  <button class="more" @click="grantMore(p.id)" title="Give them 30 more minutes before the pause starts">+30 min</button>
                  <button class="primary" @click="unpause(p.id)">Cancel</button>
                </div>
              </div>
            </template>

            <button class="ghost" @click="goRules(p.id)">Manage rules →</button>
          </div>
        </template>
        <p class="center-note sub" x-show="profiles.length===0">
          Add your first group in <b>Groups &amp; Devices</b> to start pausing internet access.
        </p>
      </section>

      <section class="section">
        <div class="section-head">
          <p class="eyebrow">Active right now</p>
          <p class="sub" x-show="activeNowList().length===0">Nothing is being blocked right now.</p>
        </div>
        <div class="card" x-show="activeNowList().length>0">
          <ul class="ledger">
            <template x-for="l in activeNowList()" :key="l.id">
              <li class="ledger-row">
                <span class="ledger-dot blocking" aria-hidden="true"></span>
                <div class="grow">
                  <p x-text="l.label"></p>
                  <p class="sub" x-text="l.groupName"></p>
                </div>
                <span class="when" x-text="l.until ? ('until ' + fmtTime(l.until)) : 'ongoing'"></span>
              </li>
            </template>
          </ul>
        </div>
        <div class="card all-clear" x-show="activeNowList().length===0">
          <span class="shield-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none"><path d="M12 2.3L4.4 5.3V11C4.4 16.4 7.8 20.9 12 22.1C16.2 20.9 19.6 16.4 19.6 11V5.3L12 2.3Z" fill="#34d399" fill-opacity="0.16" stroke="#34d399" stroke-width="1.4" stroke-linejoin="round"/><path d="M8.7 12.3L11 14.6L15.4 9.8" stroke="#6ee7b7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <h3>All clear</h3>
          <p class="sub">When a schedule kicks in, active rules show up here.</p>
        </div>
      </section>

      <section class="section" x-show="upcomingTodayList().length>0">
        <div class="section-head">
          <p class="eyebrow">Upcoming today</p>
          <p class="sub">Rules that will start later today.</p>
        </div>
        <div class="card">
          <ul class="ledger">
            <template x-for="l in upcomingTodayList()" :key="l.id">
              <li class="ledger-row">
                <span class="ledger-dot pending" aria-hidden="true"></span>
                <div class="grow">
                  <p x-text="l.name"></p>
                  <p class="sub" x-text="l.groupName + ' · blocks ' + l.label"></p>
                </div>
                <span class="when" x-text="'starts ' + l.startLabel"></span>
              </li>
            </template>
          </ul>
        </div>
      </section>
    </main>
  </template>

  <!-- Groups & Devices -->
  <template x-if="view==='groups'">
    <main>
      <header class="pagehead">
        <h1>Groups &amp; Devices</h1>
        <p class="sub">Organize devices by kid, family member, or room. Rules can target a whole group at once.</p>
      </header>

      <div class="section-toolbar">
        <p class="eyebrow">Groups</p>
        <button class="primary" @click="newGroup()">+ New group</button>
      </div>
      <template x-for="p in profiles" :key="p.id">
        <section class="card row">
          <span class="avatar" :style="'--accent:'+(p.color||'#22d3ee')" x-text="p.emoji || '🧒'"></span>
          <div class="grow">
            <h2 x-text="p.name"></h2>
            <p class="sub" x-text="memberSummary(p)"></p>
          </div>
          <button class="iconbtn" title="Edit group" aria-label="Edit group" @click="editGroup(p)">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none"><path d="M4 20l1-4.2L16.6 4.2a1.5 1.5 0 0 1 2.1 0l1.1 1.1a1.5 1.5 0 0 1 0 2.1L8.2 19l-4.2 1Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
          </button>
          <button class="iconbtn danger" title="Delete group" aria-label="Delete group" @click="removeGroupFromList(p)">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none"><path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </section>
      </template>
      <p class="center-note sub" x-show="profiles.length===0">No groups yet — add one for each kid, or however your family organizes devices.</p>

      <div class="section-toolbar">
        <p class="eyebrow">Devices</p>
      </div>
      <div class="searchbox">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input type="text" x-model="deviceQuery" placeholder="Search by name or device address">
      </div>
      <template x-for="d in filteredDevices()" :key="d.mac">
        <section class="card row device-row">
          <span class="icon-chip" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2.4" stroke="currentColor" stroke-width="1.6"/><path d="M9 18h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          </span>
          <div class="grow">
            <div class="name-line">
              <span class="n" x-text="d.name"></span>
              <span class="online-dot" :class="{on: d.connected}" :title="d.connected ? 'Online' : 'Offline'"></span>
            </div>
            <p class="mac" x-text="d.mac"></p>
          </div>
          <select :value="d.profileId || ''" @change="reassignDevice(d, $event.target.value)" aria-label="Group for this device">
            <option value="">Unassigned</option>
            <template x-for="p in profiles" :key="p.id">
              <option :value="p.id" x-text="p.name" :selected="p.id===d.profileId"></option>
            </template>
          </select>
        </section>
      </template>
      <p class="center-note sub" x-show="filteredDevices().length===0">No devices found.</p>
      <p class="center-note sub">Devices sync from your UniFi gateway.</p>
      <p class="devices-hint">📱 Apple devices often appear with generic names like "iPhone 72:68" — their Private Wi-Fi Address hides the real hardware address. Easiest fix: open the Enroll page from the device itself (see Settings).</p>
    </main>
  </template>

  <!-- Group editor (name/icon/color, plus device membership below) -->
  <template x-if="view==='groupEditor'">
    <main class="card">
      <header class="pagehead withback">
        <button class="back" @click="goGroups()" aria-label="Back to Groups & Devices">‹</button>
        <h1 x-text="editing.id ? 'Edit group' : 'New group'"></h1>
      </header>
      <label>Name <input type="text" x-model="editing.name" placeholder="Kids"></label>

      <label>Icon</label>
      <div class="chips">
        <template x-for="e in ['🧒','👧','👦','🧑','🎧','🎮','📱','🛴','🚀','🐼']">
          <button :class="{on: editing.emoji===e}" @click="editing.emoji=e" x-text="e"></button>
        </template>
      </div>

      <label>Color</label>
      <div class="chips">
        <template x-for="c in accentSwatches" :key="c.id">
          <button class="swatch" :class="{on: editing.color===c.hex}" :style="'--accent:'+c.hex" :aria-label="c.id" @click="editing.color=c.hex"></button>
        </template>
      </div>

      <label>Devices in this group</label>
      <div class="member-list" x-show="(editing.devices||[]).length">
        <template x-for="d in editing.devices" :key="d.mac">
          <div class="member-row">
            <span class="online-dot" :class="{on: editorDeviceOnline(d.mac)}" :title="editorDeviceOnline(d.mac) ? 'Online' : 'Offline'"></span>
            <div class="grow">
              <template x-if="renamingDeviceMac !== d.mac">
                <span class="n" x-text="d.name"></span>
              </template>
              <template x-if="renamingDeviceMac === d.mac">
                <input type="text" class="rename-input" x-model="renameDraft"
                  x-init="$nextTick(() => { $el.focus(); $el.select(); })"
                  @keydown.enter="commitRenameDevice(d)"
                  @keydown.escape="cancelRenameDevice()"
                  @blur="commitRenameDevice(d)"
                  :aria-label="'Rename ' + d.name">
              </template>
              <p class="mac" x-text="d.mac"></p>
            </div>
            <button type="button" class="iconbtn" title="Rename device" :aria-label="'Rename ' + d.name" x-show="renamingDeviceMac !== d.mac" @click="startRenameDevice(d)">✎</button>
            <button type="button" class="iconbtn danger" title="Remove from group" :aria-label="'Remove ' + d.name + ' from group'" @click="removeEditorDevice(d.mac)">✕</button>
          </div>
        </template>
      </div>
      <p class="member-empty" x-show="!(editing.devices||[]).length">No devices yet — add one below or enroll from the device itself (Settings → Enroll).</p>
      <p class="devices-hint" x-show="(editing.devices||[]).length">Renames sync to UniFi when you save.</p>

      <label>Add a device</label>
      <div class="searchbox">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input type="text" x-model="editorDeviceQuery" placeholder="Search by name or device address">
      </div>
      <div class="member-list" x-show="editorAddableDevices().length">
        <template x-for="d in editorAddableDevices()" :key="d.mac">
          <button type="button" class="member-row"
            :disabled="editorDeviceInOtherGroup(d)"
            @click="addEditorDevice(d)">
            <div class="grow">
              <span class="n" x-text="d.name"></span>
              <p class="mac" x-text="d.mac"></p>
            </div>
            <span class="other-group-note" x-show="editorDeviceInOtherGroup(d)" x-text="'in ' + profileName(d.profileId) + ' — move it from the Devices list or re-enroll it'"></span>
            <span class="chev" x-show="!editorDeviceInOtherGroup(d)">+</span>
          </button>
        </template>
      </div>
      <p class="member-empty" x-show="!editorAddableDevices().length">No matching devices.</p>

      <p class="bad" x-text="editError"></p>
      <button class="primary" :disabled="!editing.name.trim()" @click="saveGroup()">Save</button>
      <button class="ghost" @click="goGroups()">Cancel</button>
      <button class="ghost danger" x-show="editing.id" @click="removeGroup()">Delete group &amp; its rules</button>
    </main>
  </template>

  <!-- Rules (flat, across every group) -->
  <template x-if="view==='rules'">
    <main>
      <header class="pagehead">
        <h1>Rules</h1>
        <p class="sub">Each rule blocks something for someone, sometimes. Rules run on your UniFi gateway.</p>
      </header>

      <button class="primary" style="width:auto" @click="startWizard(rulesGroupFilter)">+ New rule</button>

      <div class="searchbox">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.8"/><path d="M20 20l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <input type="text" x-model="rulesSearch" placeholder="Search rules…">
      </div>
      <div class="filter-chip" x-show="rulesGroupFilter">
        <span x-text="'Showing: ' + profileName(rulesGroupFilter)"></span>
        <button @click="rulesGroupFilter=''">✕</button>
      </div>

      <template x-for="r in filteredRules()" :key="r.id">
        <section class="card row rule-row">
          <div class="grow">
            <div class="name-line">
              <h2 x-text="r.name"></h2>
              <span class="badge badge-group" :style="'--accent:'+groupAccent(r.profileId)" x-text="profileName(r.profileId)"></span>
            </div>
            <p class="sub summary" x-text="ruleSummary(r)"></p>
            <p class="sub blocking" x-show="r.active">⛔ blocking right now</p>
          </div>
          <label class="switch">
            <input type="checkbox" :checked="r.enabled" @change="toggleRule(r)">
            <span class="slider"></span>
          </label>
          <div class="row-actions">
            <button class="ghost" @click="editRule(r)">Edit</button>
            <button class="iconbtn danger" title="Delete rule" aria-label="Delete rule" @click="deleteRule(r)">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M5 7h14M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-9 0 1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </section>
      </template>
      <p class="center-note sub" x-show="filteredRules().length===0">No rules match — try a different search, or add one.</p>
    </main>
  </template>

  <!-- Rule wizard: Who → What → When → Name (Who only when creating) -->
  <template x-if="view==='wizard'">
    <main class="card">
      <header class="pagehead withback">
        <button class="back" @click="wizardBack()" aria-label="Back">‹</button>
        <h1 x-text="wizardStepTitle()"></h1>
      </header>

      <!-- Who -->
      <section x-show="currentWizardStepKey()==='who'">
        <label>Pick a group, or Everyone</label>
        <div class="who-grid">
          <button :class="{on: wizard.profileId==='everyone'}" @click="wizard.profileId='everyone'">
            <span class="avatar" style="--accent:#67e8f9">🌐</span><span>Everyone</span>
          </button>
          <template x-for="p in profiles" :key="p.id">
            <button :class="{on: wizard.profileId===p.id}" @click="wizard.profileId=p.id">
              <span class="avatar" :style="'--accent:'+(p.color||'#22d3ee')" x-text="p.emoji || '🧒'"></span><span x-text="p.name"></span>
            </button>
          </template>
        </div>
        <button class="primary" :disabled="!wizard.profileId" @click="wizard.step++">Next →</button>
      </section>

      <!-- What -->
      <section x-show="currentWizardStepKey()==='what'">
        <div class="preset-grid">
          <template x-for="p in presets" :key="p.id">
            <button :class="{on: wizard.whatType==='preset' && wizard.presetId===p.id}"
                    @click="wizard.whatType='preset'; wizard.presetId=p.id">
              <span class="pemoji" x-text="p.emoji"></span><span x-text="p.name"></span>
            </button>
          </template>
        </div>
        <label>Whole categories</label>
        <div class="chips">
          <template x-for="c in categories" :key="c.id">
            <button class="chip" :class="{on: wizard.whatType==='category' && wizard.categoryId===c.id}"
                    @click="wizard.whatType='category'; wizard.categoryId=c.id"
                    x-text="c.emoji + ' ' + c.name"></button>
          </template>
        </div>
        <label>Or something specific</label>
        <div class="chips">
          <button class="chip" :class="{on: wizard.whatType==='domains'}" @click="wizard.whatType='domains'">🌐 A website</button>
          <button class="chip" :class="{on: wizard.whatType==='everything'}" @click="wizard.whatType='everything'">📵 All internet</button>
        </div>
        <label x-show="wizard.whatType==='domains'">Website addresses <span class="hint-inline">(one per line)</span>
          <textarea x-model="wizard.domainsText" rows="3" placeholder="coolmathgames.com"></textarea>
        </label>
        <button class="primary" :disabled="!wizardWhatValid()" @click="wizard.step++">Next →</button>
      </section>

      <!-- When -->
      <section x-show="currentWizardStepKey()==='when'">
        <div class="chips">
          <template x-for="w in whenChoices" :key="w.id">
            <button class="chip" :class="{on: wizard.whenChoice===w.id}" @click="pickWhen(w.id)" x-text="w.label"></button>
          </template>
        </div>
        <div x-show="wizard.whenChoice!=='always'">
          <label>Days</label>
          <div class="chips">
            <template x-for="d in ['sun','mon','tue','wed','thu','fri','sat']" :key="d">
              <button class="chip" :class="{on: wizard.days.includes(d)}" @click="toggleDay(d)"
                      x-text="d[0].toUpperCase()+d.slice(1)"></button>
            </template>
          </div>
          <div class="times">
            <label>From <input type="time" x-model="wizard.start"></label>
            <label>Until <input type="time" x-model="wizard.end"></label>
          </div>
          <p class="hint" x-show="wizard.start > wizard.end">🌒 Overnight — blocks into the next morning. That's fine.</p>
        </div>
        <button class="primary" :disabled="!wizardWhenValid()" @click="wizard.name = wizard.name || suggestName(); wizard.step++">Next →</button>
      </section>

      <!-- Name -->
      <section x-show="currentWizardStepKey()==='name'">
        <label>Rule name <input type="text" x-model="wizard.name"></label>
        <p class="sub" x-text="wizardRecap()"></p>
        <p class="bad" x-text="wizard.error"></p>
        <button class="primary" :disabled="!wizard.name.trim() || wizard.saving" @click="saveRule()">
          <span x-show="!wizard.saving" x-text="wizard.mode==='edit' ? 'Save changes' : 'Create rule'"></span>
          <span x-show="wizard.saving">Saving…</span>
        </button>
      </section>
    </main>
  </template>

  <!-- Settings -->
  <template x-if="view==='settings'">
    <main>
      <header class="pagehead"><h1>Settings</h1></header>

      <section class="card">
        <h2>Gateway</h2>
        <p class="sub"><span x-text="settings.host"></span> · site <span x-text="settings.siteName"></span></p>
        <label>Gateway address <input type="text" x-model="gwForm.host"></label>
        <label>API key (required to change gateway) <input type="password" x-model="gwForm.apiKey" placeholder="Paste to change"></label>
        <p class="bad" x-text="gwForm.error"></p>
        <button class="primary" :disabled="!gwForm.host || !gwForm.apiKey" @click="saveGateway()">Update gateway</button>
        <button class="ghost" @click="trustCert()">Trust the gateway's new certificate</button>
        <p class="hint">Use "trust" after a UniFi update changes the gateway's certificate and Family Time reports a certificate error.</p>
      </section>

      <section class="card">
        <h2>Enroll a device</h2>
        <p class="sub">iPhones and iPads hide behind a "Private Wi-Fi Address" — Family Time only ever sees a random, ever-changing address, so you can't pick the real device out of the list. Enrolling fixes that: open this address in the browser <b>on the device you want to add</b>, and it identifies itself so you can name it and pick its group right there.</p>
        <p class="enroll-url" x-text="settings.enrollUrl"></p>
        <p class="hint-inline">Open this address in the browser of the device you want to enroll.</p>
      </section>

      <section class="card">
        <h2>Parent PIN</h2>
        <label>Current PIN <input type="password" inputmode="numeric" maxlength="6" x-model="pinForm.current"></label>
        <label>New PIN <input type="password" inputmode="numeric" maxlength="6" x-model="pinForm.next"></label>
        <p class="bad" x-text="pinForm.error"></p>
        <p class="good" x-text="pinForm.ok"></p>
        <button class="primary" :disabled="!pinForm.current || !/^[0-9]{4,6}$/.test(pinForm.next)" @click="savePin()">Change PIN</button>
      </section>

      <section class="card">
        <p class="sub">Data file: <code x-text="settings.dataPath"></code></p>
        <button class="ghost" @click="logout()">Lock (sign out)</button>
      </section>
    </main>
  </template>

  <!-- Enroll a device — visited by the device itself, no session required -->
  <template x-if="view==='enroll'">
    <main class="card narrow center">
      <div class="hero" x-show="enroll.status!=='done'">
        <span class="shield-mark" :class="{pulse: enroll.status==='loading'}" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="52" height="52" fill="none"><path d="M12 2.3L4.4 5.3V11C4.4 16.4 7.8 20.9 12 22.1C16.2 20.9 19.6 16.4 19.6 11V5.3L12 2.3Z" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </span>
        <h1>Enroll this device</h1>
        <p class="sub" x-show="enroll.status==='found' || enroll.status==='loading'">Family Time found this device on your network. Give it a name and a group.</p>
      </div>

      <template x-if="enroll.status==='loading'">
        <p class="sub">Looking for this device on your network…</p>
      </template>

      <template x-if="enroll.status==='unconfigured'">
        <div>
          <p class="sub">Family Time isn't set up yet.</p>
          <p class="sub">Ask a parent to finish setup on the family computer first, then come back to this page.</p>
        </div>
      </template>

      <template x-if="enroll.status==='notfound'">
        <div>
          <p class="bad">Couldn't spot this device on your network.</p>
          <p class="sub">Make sure you're on the home Wi-Fi (not cellular or a VPN) and try again.</p>
          <button class="primary" @click="loadEnrollWhoami()">Retry</button>
        </div>
      </template>

      <template x-if="enroll.status==='found'">
        <div class="enroll-form">
          <div class="enroll-detected">
            <p class="eyebrow">Detected device</p>
            <p class="enroll-detected-name" x-text="enroll.device.name"></p>
            <p class="enroll-detected-mac" x-text="enroll.device.mac"></p>
          </div>

          <p class="hint" x-show="enroll.currentProfileId">Currently in <span x-text="enrollGroupName(enroll.currentProfileId)"></span></p>

          <label>Name this device <input type="text" x-model="enroll.name" placeholder="e.g. Ava's iPad"></label>

          <label>Group</label>
          <div class="who-grid">
            <template x-for="g in enroll.groups" :key="g.id">
              <button :class="{on: enroll.profileId===g.id}" @click="enroll.profileId=g.id">
                <span class="avatar" :style="'--accent:'+(g.color||'#22d3ee')" x-text="g.emoji || '🧒'"></span><span x-text="g.name"></span>
              </button>
            </template>
          </div>
          <p class="center-note sub" x-show="enroll.groups.length===0">No groups yet — ask a parent to add one in Family Time first.</p>

          <p class="bad" x-text="enroll.error"></p>
          <button class="primary" :disabled="!enroll.name.trim() || !enroll.profileId || enroll.saving" @click="submitEnroll()">
            <span x-show="!enroll.saving">Enroll</span>
            <span x-show="enroll.saving">Enrolling…</span>
          </button>
        </div>
      </template>

      <template x-if="enroll.status==='done'">
        <div class="all-clear">
          <span class="shield-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="40" height="40" fill="none"><path d="M12 2.3L4.4 5.3V11C4.4 16.4 7.8 20.9 12 22.1C16.2 20.9 19.6 16.4 19.6 11V5.3L12 2.3Z" fill="#34d399" fill-opacity="0.16" stroke="#34d399" stroke-width="1.4" stroke-linejoin="round"/><path d="M8.7 12.3L11 14.6L15.4 9.8" stroke="#6ee7b7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <h3 x-text="'🛡️ ' + enroll.result.deviceName + ' is protected'"></h3>
          <p class="sub" x-text="'It’s in ' + enroll.result.groupName + ' now — the family’s rules apply to it automatically.'"></p>
        </div>
      </template>
    </main>
  </template>
</div>
</body>
</html>
